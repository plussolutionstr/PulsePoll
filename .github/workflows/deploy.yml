name: Deploy PulsePoll

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          MINIO_USER=${{ secrets.MINIO_USER }}
          MINIO_PASSWORD=${{ secrets.MINIO_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ISSUER=${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
          TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}
          EOF
          sed -i 's/^          //' .env

      - name: Build and deploy
        run: |
          docker compose build --parallel
          docker compose up -d --remove-orphans
          docker image prune -f

      - name: Configure nginx proxy
        run: |
          docker cp docker/nginx/pulsepoll.conf pulsify-nginx:/etc/nginx/conf.d/pulsepoll.conf
          docker exec pulsify-nginx nginx -t
          docker exec pulsify-nginx nginx -s reload

      - name: Health check
        run: |
          sleep 15
          docker compose ps

      - name: Cleanup .env
        if: always()
        run: rm -f .env
