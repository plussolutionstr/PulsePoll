map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name api.poll.pulsify.tr admin.poll.pulsify.tr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API — HTTPS
server {
    listen 443 ssl;
    server_name api.poll.pulsify.tr;

    ssl_certificate /etc/letsencrypt/live/pulsepoll/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulsepoll/privkey.pem;

    location / {
        proxy_pass http://pulsepoll-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin — HTTPS
server {
    listen 443 ssl;
    server_name admin.poll.pulsify.tr;

    proxy_buffer_size 16k;
    proxy_buffers 4 16k;
    proxy_busy_buffers_size 16k;

    ssl_certificate /etc/letsencrypt/live/pulsepoll/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulsepoll/privkey.pem;

    location / {
        proxy_pass http://pulsepoll-admin:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
